<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AutoContent Calendar</title>
  <style>
    :root {
      --brand: #6c47ff;
      --brand-light: #ede9ff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #f97316;
      --bg: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }

    .page {
      max-width: 780px;
      margin: 0 auto;
      padding: 40px 48px;
    }

    /* ── Header ── */
    .doc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 20px;
      border-bottom: 3px solid var(--brand);
      margin-bottom: 32px;
    }

    .doc-header .logo {
      font-size: 22px;
      font-weight: 800;
      color: var(--brand);
      letter-spacing: -0.5px;
    }

    .doc-header .meta {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
    }

    /* ── Headings ── */
    h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--brand);
      margin: 28px 0 10px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--brand-light);
    }

    h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin: 20px 0 8px;
    }

    h3 {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 16px 0 6px;
    }

    h4 {
      font-size: 13px;
      font-weight: 600;
      margin: 12px 0 4px;
    }

    /* ── Paragraphs & text ── */
    p {
      margin: 6px 0;
    }

    strong {
      font-weight: 700;
    }

    em {
      color: var(--muted);
      font-style: italic;
    }

    /* ── Lists ── */
    ul, ol {
      margin: 6px 0 6px 20px;
    }

    li {
      margin: 3px 0;
    }

    /* ── Tables ── */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
      font-size: 12px;
    }

    th {
      background: var(--brand-light);
      color: var(--brand);
      font-weight: 700;
      text-align: left;
      padding: 7px 10px;
      border: 1px solid var(--border);
    }

    td {
      padding: 6px 10px;
      border: 1px solid var(--border);
      vertical-align: top;
    }

    tr:nth-child(even) td {
      background: #fafafa;
    }

    /* ── Horizontal rule ── */
    hr {
      border: none;
      border-top: 2px solid var(--brand-light);
      margin: 28px 0;
    }

    /* ── Code ── */
    code {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 11px;
      background: var(--brand-light);
      color: var(--brand);
      padding: 1px 5px;
      border-radius: 3px;
    }

    /* ── Blockquote ── */
    blockquote {
      border-left: 3px solid var(--brand);
      padding-left: 14px;
      color: var(--muted);
      margin: 10px 0;
    }

    /* ── Video concept card wrapper ── */
    .concept-card {
      break-before: page;
      padding-top: 8px;
    }

    /* ── Page breaks ── */
    @media print {
      .concept-card { break-before: page; }
      h1 { break-before: avoid; }
      table { break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="doc-header">
      <div class="logo">AutoContent</div>
      <div class="meta">YouTube Content Calendar<br/>Generated by AutoContent AI</div>
    </div>
    <!--CONTENT-->
  </div>
</body>
</html>
